<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>InnoLab 3D-Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <script type="importmap">
        {
          "imports":{
            "three"        :"https://unpkg.com/three@0.163.0/build/three.module.js",
            "three/addons/":"https://unpkg.com/three@0.163.0/examples/jsm/",
            "gsap"         :"https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
          }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Inter,sans-serif;
            background: #000;
            color: #eee;
            overflow: hidden
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: grab
        }

            #canvas:active {
                cursor: grabbing
            }

        #logo {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 120px;
            z-index: 4;
            filter: drop-shadow(0 0 6px rgba(0,0,0,.6))
        }

        #panel {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 3;
            width: 310px;
            background: rgba(40,40,40,.87);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.55)
        }

            #panel h6 {
                font-size: 1rem;
                margin-bottom: .9rem;
                text-transform: uppercase;
                letter-spacing: .6px;
                font-weight: 600
            }

        .btn-main {
            background: #6c757d;
            color: #fff;
            border: none
        }

            .btn-main:hover {
                background: #5a6268
            }

            .btn-main:active, .btn-main:focus {
                background: #545c63;
                box-shadow: 0 0 0 .25rem rgba(108,117,125,.5)
            }

        .badge-val {
            min-width: 56px;
            text-align: center;
            font-size: .82rem;
            font-variant-numeric: tabular-nums;
            border-radius: 999px
        }

        .badge-green {
            background: #28a745
        }

        .badge-yellow {
            background: #ffc107;
            color: #111
        }

        .badge-red {
            background: #dc3545
        }

        .badge-gray {
            background: #6c757d
        }

        .floor-block {
            margin-bottom: .4rem
        }

        .room-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .78rem;
            margin-left: .75rem;
            margin-top: .25rem;
            cursor: pointer;
            transition: background .15s ease
        }

            .room-line:hover {
                background: rgba(255,255,255,.06);
                border-radius: 8px
            }

        .section-label {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            opacity: .6;
            margin: .6rem 0 .25rem
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 5000;
            transition: opacity .4s ease
        }

            #loader.hidden {
                opacity: 0;
                pointer-events: none
            }
    </style>
</head>
<body>
    <img id="logo" src="LOGO.png" alt="Logo" />
    <canvas id="canvas"></canvas>

    <div id="panel">
        <div class="dropdown mb-3">
            <button id="buildingBtn" class="btn btn-main dropdown-toggle w-100" data-bs-toggle="dropdown">
                Gebäude A – Kamera
            </button>
            <ul class="dropdown-menu dropdown-menu-dark w-100">
                <li><a class="dropdown-item js-floor" data-floor="-1" href="#">Ganzes Gebäude</a></li>
                <li><a class="dropdown-item js-floor" data-floor="0" href="#">EG</a></li>
                <li><a class="dropdown-item js-floor" data-floor="1" href="#">1. Stock</a></li>
                <li><a class="dropdown-item js-floor" data-floor="2" href="#">2. Stock</a></li>
                <li><a class="dropdown-item js-floor" data-floor="3" href="#">3. Stock</a></li>
                <li><a class="dropdown-item js-floor" data-floor="4" href="#">4. Stock</a></li>
                <li><a class="dropdown-item js-floor" data-floor="5" href="#">5. Stock</a></li>
                <li><a class="dropdown-item js-floor" data-floor="6" href="#">6. Stock</a></li>
            </ul>
        </div>

        <button id="autoBtn" class="btn btn-main mb-1 w-100">Auto-Rotate</button>
        <button id="resetBtn" class="btn btn-main mb-1 w-100">Kamera-Reset</button>
        <button id="deselectBtn" class="btn btn-secondary mb-3 w-100 d-none">Auswahl aufheben</button>

        <hr />

        <div class="section-label">Sensorisierte Räume</div>

        <div class="floor-block">
            <strong style="font-size:.8rem;">2. Stock</strong>
            <div id="rooms-2"></div>
        </div>
        <div class="floor-block">
            <strong style="font-size:.8rem;">3. Stock</strong>
            <div id="rooms-3"></div>
        </div>
        <div class="floor-block">
            <strong style="font-size:.8rem;">4. Stock</strong>
            <div id="rooms-4"></div>
        </div>
        <div class="floor-block">
            <strong style="font-size:.8rem;">5. Stock</strong>
            <div id="rooms-5"></div>
        </div>
        <div class="floor-block">
            <strong style="font-size:.8rem;">6. Stock</strong>
            <div id="rooms-6"></div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-light mb-3"></div>
        <div class="progress w-50"><div id="loadBar" class="progress-bar progress-bar-striped progress-bar-animated"></div></div>
    </div>

    <script type="module">
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);

        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
        import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
        import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
        import gsap from "gsap";

        function normId(str) {
            return (str || "")
                .normalize("NFD")
                .replace(/\p{Diacritic}/gu, "")
                .replace(/ß/giu, "SS")
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, "");
        }

        const FLOOR_BASE_OPACITY = 0.28;
        const ROOM_BASE_OPACITY = 0.28;
        const ALERT_COLOR = new THREE.Color(0xdc3545);

        const renderer = new THREE.WebGLRenderer({ canvas: $("#canvas"), antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, 1, .1, 1000);

        const DEFAULT_CAM_POS = new THREE.Vector3(85, 55, 5);
        const DEFAULT_TARGET = new THREE.Vector3(0, 0, 0);

        camera.position.copy(DEFAULT_CAM_POS);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = .08;
        controls.maxPolarAngle = Math.PI * .48;
        controls.target.copy(DEFAULT_TARGET);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(25, 45, 25);
        scene.add(sun);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.45, 0.25);
        composer.addPass(bloom);

        function resize() {
            renderer.setSize(innerWidth, innerHeight, false);
            composer.setSize(innerWidth, innerHeight);
            bloom.setSize(innerWidth, innerHeight);
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
        }
        addEventListener("resize", resize); resize();

        const FLOOR_NAMES = ["EG", "1OG", "2OG", "3OG", "4OG", "5OG", "6OG"];
        const SENSOR_ROOMS = {
            2: ["A1.04B", "A2.07", "A2.12"],
            3: ["A3.06", "A3.11"],
            4: ["A4.36"],
            5: ["A5.09", "A5.11", "A5.18"],
            6: ["A6.09", "A6.23", "A6.28"]
        };
        const SENSOR_BY_ID = {};
        for (const fStr of Object.keys(SENSOR_ROOMS)) {
            const f = +fStr;
            for (const r of SENSOR_ROOMS[f]) {
                SENSOR_BY_ID[normId(r)] = { floor: f, name: r };
            }
        }

        const building = new THREE.Group();
        scene.add(building);

        const floors = Array(7).fill(null);
        const floorHeights = Array(7).fill(null);
        const PICKABLE_FLOORS = [];
        const CLICKABLE_ROOMS = [];

        const allRoomMeshes = [];
        const sensorRoomMeshes = Array(7).fill(0).map(() => ({}));
        const roomValues = {};

        let selectedFloor = -1;

        function buildRoomUI() {
            for (let f = 2; f <= 6; f++) {
                const wrap = $(`#rooms-${f}`);
                wrap.innerHTML = "";
                (SENSOR_ROOMS[f] || []).forEach(name => {
                    const id = `room-${f}-${name.replace(/[^a-zA-Z0-9]/g, "_")}`;
                    const div = document.createElement("div");
                    div.className = "room-line";
                    div.id = id;
                    div.innerHTML = `
                            <span>${name}</span>
                            <span class="badge badge-val badge-gray">–</span>
                        `;
                    div.addEventListener("click", () => {
                        const def = sensorRoomMeshes[f][name];
                        if (def && def.mesh) {
                            focusRoom(def.mesh, f);
                        } else {
                            focusFloor(f);
                        }
                    });
                    wrap.appendChild(div);
                });
            }
        }
        buildRoomUI();

        function setRoomBadge(f, name, val) {
            const id = `room-${f}-${name.replace(/[^a-zA-Z0-9]/g, "_")}`;
            const el = document.getElementById(id);
            if (!el) return;
            const b = el.querySelector(".badge");
            b.textContent = val;
            b.className = `badge badge-val ${val >= 1400 ? "badge-red" : val >= 800 ? "badge-yellow" : "badge-green"}`;
        }
        function clearRoomBadge(f, name) {
            const id = `room-${f}-${name.replace(/[^a-zA-Z0-9]/g, "_")}`;
            const el = document.getElementById(id);
            if (!el) return;
            const b = el.querySelector(".badge");
            b.textContent = "–";
            b.className = "badge badge-val badge-gray";
        }

        function updateDropdownLabel() {
            const btn = $("#buildingBtn");
            if (selectedFloor === -1) {
                btn.textContent = "Gebäude A – Kamera";
            } else if (selectedFloor === 0) {
                btn.textContent = "EG – Kamera";
            } else {
                btn.textContent = `${selectedFloor}. Stock – Kamera`;
            }
        }

        function detectVerticalAxis() {
            const pos = [];
            for (const f of floors) {
                if (!f) continue;
                const v = new THREE.Vector3();
                f.getWorldPosition(v);
                pos.push(v);
            }
            if (!pos.length) return "y";

            const avg = { x: 0, y: 0, z: 0 };
            for (const p of pos) { avg.x += p.x; avg.y += p.y; avg.z += p.z; }
            avg.x /= pos.length; avg.y /= pos.length; avg.z /= pos.length;

            let vx = 0, vy = 0, vz = 0;
            for (const p of pos) {
                vx += (p.x - avg.x) ** 2;
                vy += (p.y - avg.y) ** 2;
                vz += (p.z - avg.z) ** 2;
            }
            if (vx > vy && vx > vz) return "x";
            if (vy > vx && vy > vz) return "y";
            return "z";
        }

        function worldPosOf(obj) {
            const v = new THREE.Vector3();
            obj.getWorldPosition(v);
            return v;
        }

        const loader = new GLTFLoader();
        loader.manager.onProgress = (_u, l, t) => $("#loadBar").style.width = `${l / t * 100}%`;
        loader.manager.onLoad = () => $("#loader").classList.add("hidden");

        function updateDefaultCameraToFitBuilding() {
            const box = new THREE.Box3().setFromObject(building);
            if (box.isEmpty()) return;

            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const dist = size.length() * 1.25;

            const pos = new THREE.Vector3(
                center.x + dist * 0.9,
                center.y + dist * 0.6,
                center.z + dist * 0.12
            );

            camera.position.copy(pos);
            controls.target.copy(center);

            DEFAULT_CAM_POS.copy(pos);
            DEFAULT_TARGET.copy(center);

            camera.updateProjectionMatrix();
        }

        loader.load("GebeudeAVoll.glb", glb => {
            const root = glb.scene;
            building.add(root);

            root.traverse(o => {
                if (!o.name) return;
                const idx = FLOOR_NAMES.indexOf(normId(o.name));
                if (idx !== -1) {
                    o.traverse(m => {
                        if (!m.isMesh) return;
                        m.material = m.material.clone();
                        m.material.transparent = true;
                        m.material.opacity = FLOOR_BASE_OPACITY;
                        m.material.color.setHex(0xb0b0b0);
                        m.userData.baseColor = m.material.color.clone();
                        m.userData.baseOpacity = FLOOR_BASE_OPACITY;
                    });
                    floors[idx] = o;
                    PICKABLE_FLOORS.push(o);
                }
            });

            const axis = detectVerticalAxis();

            for (let i = 0; i < floors.length; i++) {
                const f = floors[i];
                if (!f) continue;
                const v = new THREE.Vector3();
                f.getWorldPosition(v);
                floorHeights[i] = v[axis];
            }

            root.traverse(o => {
                if (!o.isMesh) return;

                let p = o.parent, isFloorChild = false;
                while (p) {
                    if (floors.includes(p)) { isFloorChild = true; break; }
                    p = p.parent;
                }
                if (isFloorChild) return;

                const wpos = worldPosOf(o);
                const h = wpos[axis];
                let nearest = -1, best = Infinity;
                for (let i = 0; i < floorHeights.length; i++) {
                    const fh = floorHeights[i];
                    if (fh == null) continue;
                    const d = Math.abs(h - fh);
                    if (d < best) { best = d; nearest = i; }
                }
                if (nearest === -1) return;

                allRoomMeshes.push({ mesh: o, floor: nearest });

                const glbName = o.name || "";
                const glbId = normId(glbName);

                if (SENSOR_BY_ID[glbId]) {
                    const { floor, name } = SENSOR_BY_ID[glbId];
                    makeSensorRoom(floor, name, o);
                    return;
                }
                for (const key of Object.keys(SENSOR_BY_ID)) {
                    if (glbId.endsWith(key)) {
                        const { floor, name } = SENSOR_BY_ID[key];
                        makeSensorRoom(floor, name, o);
                        return;
                    }
                }
            });

            applyVisibility();
            applyValues();
            updateDefaultCameraToFitBuilding();
        });

        function makeSensorRoom(floor, name, mesh) {
            mesh.material = mesh.material.clone();
            mesh.material.transparent = true;
            mesh.material.opacity = ROOM_BASE_OPACITY;
            const baseColor = mesh.material.color.clone();
            const baseOpacity = mesh.material.opacity;
            sensorRoomMeshes[floor][name] = { mesh, baseColor, baseOpacity };
            CLICKABLE_ROOMS.push({ mesh, floor, name });
        }

        function applyVisibility() {
            floors.forEach((f, idx) => {
                if (!f) return;
                f.visible = (selectedFloor === -1 || selectedFloor === idx);
            });
            for (const r of allRoomMeshes) {
                r.mesh.visible = (selectedFloor === -1 || selectedFloor === r.floor);
            }
        }

        function tweenColorTo(mat, targetColor) {
            const c = (targetColor instanceof THREE.Color) ? targetColor : new THREE.Color(targetColor);
            gsap.to(mat.color, {
                r: c.r,
                g: c.g,
                b: c.b,
                duration: 0.6,
                ease: "power2.out"
            });
        }

        function tweenOpacityTo(mat, value) {
            gsap.to(mat, {
                opacity: value,
                duration: 0.6,
                ease: "power2.out"
            });
        }

        function applyValues() {
            for (let f = 2; f <= 6; f++) {
                const vals = roomValues[f] || {};
                const defs = sensorRoomMeshes[f];
                for (const name of Object.keys(defs)) {
                    const def = defs[name];
                    const v = vals[name];
                    const baseColor = def.baseColor || new THREE.Color(0x6c757d);
                    const baseOpacity = typeof def.baseOpacity === "number" ? def.baseOpacity : ROOM_BASE_OPACITY;

                    if (typeof v === "number") {
                        const ratio = 1 - (v / 100);
                        const col = baseColor.clone().lerp(ALERT_COLOR, ratio);
                        tweenColorTo(def.mesh.material, col);
                        tweenOpacityTo(def.mesh.material, baseOpacity);
                        setRoomBadge(f, name, v);
                    } else {
                        tweenColorTo(def.mesh.material, baseColor);
                        tweenOpacityTo(def.mesh.material, baseOpacity);
                        clearRoomBadge(f, name);
                    }

                    def.mesh.visible = (selectedFloor === -1 || selectedFloor === f);
                }
            }
        }

        (function openWs() {
            const ws = new WebSocket("ws://localhost:5000/ws");
            ws.onmessage = ev => {
                try {
                    const data = JSON.parse(ev.data);
                    if (data.rooms) {
                        for (const key of Object.keys(data.rooms)) {
                            roomValues[parseInt(key, 10)] = data.rooms[key];
                        }
                        applyValues();
                        applyVisibility();
                    }
                } catch (err) {
                    console.warn("WS JSON Fehler:", err);
                }
            };
        })();

        function focusBuilding() {
            selectedFloor = -1;
            $("#deselectBtn").classList.add("d-none");
            updateDropdownLabel();
            gsap.to(camera.position, {
                x: DEFAULT_CAM_POS.x,
                y: DEFAULT_CAM_POS.y,
                z: DEFAULT_CAM_POS.z,
                duration: .6,
                ease: "power2.out"
            });
            gsap.to(controls.target, {
                x: DEFAULT_TARGET.x,
                y: DEFAULT_TARGET.y,
                z: DEFAULT_TARGET.z,
                duration: .6,
                ease: "power2.out"
            });
            applyVisibility();
            applyValues();
        }

        function focusFloor(idx) {
            if (!floors[idx]) return;
            selectedFloor = idx;
            $("#deselectBtn").classList.remove("d-none");
            updateDropdownLabel();

            const box = new THREE.Box3().setFromObject(floors[idx]);
            const c = box.getCenter(new THREE.Vector3());
            const d = box.getSize(new THREE.Vector3()).length() * 0.85;
            const pos = new THREE.Vector3(c.x + d * 0.65, c.y + d * 0.35, c.z + d * 0.1);
            gsap.to(camera.position, { x: pos.x, y: pos.y, z: pos.z, duration: .6, ease: "power2.out" });
            gsap.to(controls.target, { x: c.x, y: c.y, z: c.z, duration: .6, ease: "power2.out" });

            applyVisibility();
            applyValues();
        }

        function focusRoom(mesh, floor) {
            selectedFloor = floor;
            $("#deselectBtn").classList.remove("d-none");
            updateDropdownLabel();

            const box = new THREE.Box3().setFromObject(mesh);
            const c = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const dist = Math.max(size.x, size.y, size.z) * 2.2;

            const camPos = new THREE.Vector3(c.x + dist, c.y + dist * 0.55, c.z + dist * 0.15);
            gsap.to(camera.position, { x: camPos.x, y: camPos.y, z: camPos.z, duration: .55, ease: "power2.out" });
            gsap.to(controls.target, { x: c.x, y: c.y, z: c.z, duration: .55, ease: "power2.out" });

            applyVisibility();
            applyValues();
        }

        $$(".js-floor").forEach(a => {
            a.onclick = e => {
                e.preventDefault();
                const idx = +a.dataset.floor;
                if (idx === -1) focusBuilding(); else focusFloor(idx);
            };
        });
        $("#deselectBtn").onclick = focusBuilding;
        $("#resetBtn").onclick = focusBuilding;

        let auto = false, rot = 0;
        $("#autoBtn").onclick = () => {
            auto = !auto;
            $("#autoBtn").classList.toggle("btn-dark", auto);
        };

        const ray = new THREE.Raycaster(), ptr = new THREE.Vector2();
        let drag = false;
        $("#canvas").addEventListener("pointerdown", () => drag = false);
        $("#canvas").addEventListener("pointermove", () => drag = true);
        $("#canvas").addEventListener("pointerup", e => {
            if (drag) return;
            const r = $("#canvas").getBoundingClientRect();
            ptr.x = (e.clientX - r.left) / r.width * 2 - 1;
            ptr.y = -(e.clientY - r.top) / r.height * 2 + 1;
            ray.setFromCamera(ptr, camera);

            const roomHits = ray.intersectObjects(CLICKABLE_ROOMS.map(r => r.mesh), true);
            if (roomHits.length) {
                const hitMesh = roomHits[0].object;
                const def = CLICKABLE_ROOMS.find(r => r.mesh === hitMesh || hitMesh.parent === r.mesh);
                if (def) {
                    focusRoom(def.mesh, def.floor);
                    return;
                }
            }

            const floorHits = ray.intersectObjects(PICKABLE_FLOORS, true);
            if (floorHits.length) {
                let o = floorHits[0].object;
                while (o && !floors.includes(o)) o = o.parent;
                const idx = floors.indexOf(o);
                if (idx >= 0) focusFloor(idx);
            }
        });

        (function animate() {
            requestAnimationFrame(animate);
            if (auto) {
                rot += .0015;
                building.rotation.y = rot;
            }
            controls.update();
            composer.render();
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
