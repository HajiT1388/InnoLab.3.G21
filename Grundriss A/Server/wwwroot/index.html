<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>InnoLab 3D-Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <script type="importmap">
        {
          "imports":{
            "three"        :"https://unpkg.com/three@0.163.0/build/three.module.js",
            "three/addons/":"https://unpkg.com/three@0.163.0/examples/jsm/",
            "gsap"         :"https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
          }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Inter,sans-serif;
            background: #000;
            color: #eee;
            overflow: hidden
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: block
        }

        #logo {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 120px;
            z-index: 4;
            filter: drop-shadow(0 0 6px rgba(0,0,0,.6))
        }

        #panel {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 3;
            width: 310px;
            background: rgba(40,40,40,.85);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,.55)
        }

            #panel h6 {
                font-size: 1rem;
                margin-bottom: .9rem;
                text-transform: uppercase;
                letter-spacing: .6px;
                font-weight: 600
            }

        .btn-main {
            background: #6c757d;
            color: #fff;
            border: none
        }

            .btn-main:hover {
                background: #5a6268
            }

            .btn-main:active, .btn-main:focus {
                background: #545c63;
                box-shadow: 0 0 0 .25rem rgba(108,117,125,.5)
            }

        .badge-val {
            width: 56px;
            text-align: center;
            font-size: .9rem;
            font-variant-numeric: tabular-nums
        }

        .badge-green {
            background: #28a745
        }

        .badge-yellow {
            background: #ffc107
        }

        .badge-red {
            background: #dc3545
        }

        .hiddenBadge {
            display: none !important
        }

        #toastZone {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4000
        }

        .toast[data-bs-theme=dark] {
            --bs-toast-bg: #222;
            --bs-toast-border-color: transparent
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 5000;
            transition: opacity .4s ease
        }

            #loader.hidden {
                opacity: 0;
                pointer-events: none
            }
    </style>
</head>
<body>
    <img id="logo" src="LOGO.png" alt="Logo" />
    <canvas id="canvas"></canvas>

    <div id="panel">
        <h6>Einstellungen</h6>

        <div class="dropdown mb-3">
            <button id="buildingBtn" class="btn btn-main dropdown-toggle w-100" data-bs-toggle="dropdown">
                Gebäude&nbsp;A&nbsp;–&nbsp;Auswahl&nbsp;leer
            </button>
            <ul class="dropdown-menu dropdown-menu-dark w-100">
                <li><a class="dropdown-item floorItem" data-floor="0" href="#">Erdgeschoss</a></li>
                <li><a class="dropdown-item floorItem" data-floor="1" href="#">1.&nbsp;Stock</a></li>
                <li><a class="dropdown-item floorItem" data-floor="2" href="#">2.&nbsp;Stock</a></li>
                <li><a class="dropdown-item floorItem" data-floor="3" href="#">3.&nbsp;Stock</a></li>
                <li><a class="dropdown-item floorItem" data-floor="4" href="#">4.&nbsp;Stock</a></li>
                <li><a class="dropdown-item floorItem" data-floor="5" href="#">5.&nbsp;Stock</a></li>
                <li><a class="dropdown-item floorItem" data-floor="6" href="#">6.&nbsp;Stock</a></li>
            </ul>
        </div>

        <div id="roomGroup" class="dropdown mb-3 d-none">
            <button id="roomBtn" class="btn btn-main dropdown-toggle w-100" data-bs-toggle="dropdown">
                Raum&nbsp;auswählen
            </button>
            <ul id="roomList" class="dropdown-menu dropdown-menu-dark w-100"></ul>
        </div>

        <button id="autoBtn" class="btn btn-main mb-1 w-100">Auto-Rotate</button>
        <button id="resetBtn" class="btn btn-main mb-1 w-100">Kamera-Reset</button>
        <button id="deselectBtn" class="btn btn-main d-none w-100">Auswahl aufheben</button>

        <hr />
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;EG</span><span id="val0" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;1S</span><span id="val1" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;2S</span><span id="val2" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;3S</span><span id="val3" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;4S</span><span id="val4" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;5S</span><span id="val5" class="badge badge-val badge-green">100</span></div>
        <div class="d-flex justify-content-between"><span>Qualität&nbsp;6S</span><span id="val6" class="badge badge-val badge-green">100</span></div>
    </div>

    <div id="loader"><div class="spinner-border text-light mb-3"></div><div class="progress w-50"><div id="loadBar" class="progress-bar progress-bar-striped progress-bar-animated"></div></div></div>
    <div id="toastZone" class="toast-container p-3"></div>

    <script type="module">
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);

        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
        import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
        import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
        import gsap from "gsap";

        const FLOOR_H = 15;
        const BASE_SCALE = .9;
        const SEL_SCALE = 1.05;
        const BASE_OP = .25;

        const renderer = new THREE.WebGLRenderer({ canvas: $("#canvas"), antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, 1, .1, 1000);
        camera.position.set(0, 22, 80);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = .08; controls.maxPolarAngle = Math.PI * .48;

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, .6));
        scene.add(new THREE.DirectionalLight(0xffffff, .7).position.set(25, 45, 25));

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(), .9, .45, .25));

        function resize() {
            renderer.setSize(innerWidth, innerHeight, false);
            composer.setSize(innerWidth, innerHeight);
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
        }
        addEventListener("resize", resize); resize();

        const group = new THREE.Group(); scene.add(group);
        const floors = Array(7).fill(null);
        const rooms = {};

        const tween = (o, p, v, d = .6) => gsap.to(o, { [p]: v, duration: d, ease: "power2.out" });
        const tweenColor = (m, h) => { const c = new THREE.Color(h); gsap.to(m.color, { r: c.r, g: c.g, b: c.b, duration: .6, ease: "power2.out" }); };

        const B = [...Array(7)].map((_, i) => $("#val" + i));
        const badgeCls = v => v > 66 ? "badge-green" : v > 33 ? "badge-yellow" : "badge-red";
        const colPick = v => { const c = new THREE.Color(); c.setHSL((v / 100) * .3333, 1, .5); return c.getHex(); };
        const colNeutral = 0x666666;

        function notify(txt) {
            const d = document.createElement("div");
            d.className = "toast align-items-center border-0"; d.dataset.bsTheme = "dark";
            d.innerHTML = `<div class="d-flex"><div class="toast-body">${txt}</div></div>`;
            $("#toastZone").appendChild(d);
            new bootstrap.Toast(d, { delay: 2000 }).show();
            d.addEventListener("hidden.bs.toast", () => d.remove());
        }

        const loader = new GLTFLoader();
        loader.manager.onProgress = (_u, l, t) => $("#loadBar").style.width = `${l / t * 100}%`;
        loader.manager.onLoad = () => { $("#loader").classList.add("hidden"); notify("Modelle geladen"); };

        loader.load("GebeudeAVoll.glb", glb => {
            const root = glb.scene;
            let anchorMesh = null;

            root.traverse(o => {
                if (!o.isMesh) return;
                o.material = o.material.clone();
                o.material.transparent = true;
                o.material.opacity = BASE_OP;
                if (o.name === "A104a") { anchorMesh = o; o.visible = false; }
            });

            const children = [...root.children];
            const nameToIdx = n => {
                n = n.replace(/\s+/g, "").toUpperCase();
                if (n === "EG") return 0;
                const m = n.match(/^([1-6])O?G$/);
                return m ? +m[1] : -1;
            };

            children.forEach(obj => {
                const idx = nameToIdx(obj.name);
                if (idx < 0 || idx > 6) return;
                obj.position.y = idx * FLOOR_H;
                obj.scale.setScalar(BASE_SCALE);
                group.add(obj);
                floors[idx] = obj;
            });

            if (anchorMesh) {
                let p = anchorMesh;
                while (p && !floors.includes(p)) p = p.parent;
                const idx = floors.indexOf(p);
                rooms[idx] = { A104a: { mesh: anchorMesh, light: null } };

                const L = new THREE.PointLight(0xffffff, 0, 12, 2);
                new THREE.Box3().setFromObject(anchorMesh).getCenter(L.position);
                scene.add(L);
                rooms[idx].A104a.light = L;
            }
        });

        function colorOnlyRoom(mesh, col) {
            const bb = new THREE.Box3().setFromObject(mesh).expandByScalar(.05);
            const floorIdx = floors.findIndex(f => f && f.children.includes(mesh));
            floors[floorIdx].traverse(o => {
                if (!o.isMesh) return;
                const hit = bb.intersectsBox(new THREE.Box3().setFromObject(o));
                tweenColor(o.material, hit ? col : colNeutral);
            });
        }

        function setBadge(i, v) {
            if (!floors[i]) return;
            const bd = B[i]; bd.textContent = v; bd.className = `badge badge-val ${badgeCls(v)}`;
            const col = colPick(v);

            if (rooms[i]?.A104a) {
                const { mesh, light } = rooms[i].A104a;
                light.color.setHex(col); light.intensity = v / 25;
                colorOnlyRoom(mesh, col);
            } else {
                floors[i].traverse(o => o.isMesh && tweenColor(o.material, col));
            }
        }

        new WebSocket("ws://localhost:5000/ws").onmessage = e => {
            try { JSON.parse(e.data).values.forEach((v, i) => setBadge(i, v)); } catch { }
        };

        let selectedFloor = null, selectedRoom = null;

        const focus = (obj, f = 1) => {
            const box = new THREE.Box3().setFromObject(obj),
                c = box.getCenter(new THREE.Vector3()),
                d = box.getSize(new THREE.Vector3()).length() * f,
                pos = new THREE.Vector3(c.x + d * .707, c.y + d * .35, c.z + d * .707);
            ["x", "y", "z"].forEach(p => { tween(camera.position, p, pos[p]); controls.target[p] = c[p]; });
        };

        function tScale(f, s) { ["x", "y", "z"].forEach(a => tween(f.scale, a, s)); }

        function populateRooms(idx) {
            const rm = rooms[idx]; roomList.innerHTML = "";
            if (!rm) return;
            Object.keys(rm).forEach(id => {
                roomList.insertAdjacentHTML("beforeend",
                    `<li><a class="dropdown-item roomItem" href="#" data-room="${id}">${id}</a></li>`);
            });
            roomBtn.textContent = "Raum auswählen";
            $$(".roomItem").forEach(a => a.onclick = e => {
                e.preventDefault();
                selectedRoom = a.dataset.room; roomBtn.textContent = selectedRoom;
                focus(rm[selectedRoom].mesh, 2.8);
            });
        }

        function selectFloor(idx) {
            if (selectedFloor === idx) { deselect(); return; }
            selectedFloor = idx; selectedRoom = null;
            floors.forEach((f, i) => { if (!f) return; const sel = i === idx; f.visible = sel; tScale(f, sel ? SEL_SCALE : BASE_SCALE); });
            focus(floors[idx], 1.2);
            $("#deselectBtn").classList.remove("d-none");
            $("#buildingBtn").textContent = `Gebäude A – ${["EG", "1. Stock", "2. Stock", "3. Stock", "4. Stock", "5. Stock", "6. Stock"][idx]}`;
            rooms[idx] ? (populateRooms(idx), roomGroup.classList.remove("d-none"))
                : roomGroup.classList.add("d-none");
        }

        function deselect() {
            if (selectedFloor === null) return;
            floors.forEach(f => { if (!f) return; f.visible = true; tScale(f, BASE_SCALE); });
            selectedFloor = null; selectedRoom = null;
            $("#deselectBtn").classList.add("d-none");
            $("#buildingBtn").textContent = "Gebäude A – Auswahl leer";
            roomGroup.classList.add("d-none");
        }

        $$(".floorItem").forEach(a => a.onclick = e => { e.preventDefault(); selectFloor(+a.dataset.floor); });
        $("#deselectBtn").onclick = deselect;
        $("#resetBtn").onclick = () => { camera.position.set(0, 22, 80); controls.target.set(0, 0, 0); };

        let auto = false, rot = 0;
        $("#autoBtn").onclick = () => { auto = !auto; $("#autoBtn").classList.toggle("btn-dark", auto); };

        const ray = new THREE.Raycaster(), ptr = new THREE.Vector2(); let drag = false;
        $("#canvas").addEventListener("pointerdown", () => drag = false);
        $("#canvas").addEventListener("pointermove", () => drag = true);
        $("#canvas").addEventListener("pointerup", e => {
            if (drag) return;
            const r = $("#canvas").getBoundingClientRect();
            ptr.x = (e.clientX - r.left) / r.width * 2 - 1;
            ptr.y = -(e.clientY - r.top) / r.height * 2 + 1;
            ray.setFromCamera(ptr, camera);
            const hit = ray.intersectObjects(group.children, true)[0];
            if (hit) {
                let o = hit.object;
                while (o.parent && !floors.includes(o)) o = o.parent;
                const idx = floors.indexOf(o);
                if (idx >= 0) selectFloor(idx);
            }
        });

        (function animate() {
            requestAnimationFrame(animate);
            if (auto && selectedFloor === null) { rot += .0015; group.rotation.y = rot; }
            controls.update(); composer.render();
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
