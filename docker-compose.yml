services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: inno3-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  server:
    build:
      context: './Grundriss A/.'
      dockerfile: Dockerfile
    container_name: inno3-server
    depends_on:
      - mosquitto
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MQTT_HOST=mosquitto
 #     - MQTT_HOST=test.mosquitto.org
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=building/floor
      - MQTT_TOPIC_SUFFIX=airquality
    volumes:
      - './Grundriss A/Server/wwwroot:/app/wwwroot'
    restart: always

  mqtt-publisher:
    build: .
    container_name: mqtt-publisher
    depends_on:
      - mosquitto
    restart: unless-stopped
    environment:
      - POWERSHELL_TELEMETRY_OPTOUT=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=building/floor
      - MQTT_TOPIC_SUFFIX=airquality
      - MQTT_INTERVAL=3
      - MQTT_FLOOR_COUNT=7
      - MQTT_QOS=1
    tty: true

networks:
  default:
    driver: bridge
